name: Docker Image Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine whether to publish version tags
        id: publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          publish_version_tags=false
          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head}^" >/dev/null 2>&1; then
              base="${head}^"
            else
              base="$head"
            fi
          fi

          if [ "$base" != "$head" ] && ! git diff --quiet "$base" "$head" -- VERSION; then
            publish_version_tags=true
          fi

          echo "publish_version_tags=$publish_version_tags" >> "$GITHUB_OUTPUT"

      - name: Read version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "VERSION must be valid SemVer without build metadata: $version" >&2
            exit 1
          fi

          core="${version%%-*}"
          major="${core%%.*}"
          minor="${core%.*}"
          if [ "$version" = "$core" ]; then
            stable=true
          else
            stable=false
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.version.outputs.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.publish.outputs.publish_version_tags == 'true' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.stable == 'true' && steps.publish.outputs.publish_version_tags == 'true' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.stable == 'true' && steps.publish.outputs.publish_version_tags == 'true' }}
            type=raw,value=latest,enable=${{ steps.version.outputs.stable == 'true' && steps.publish.outputs.publish_version_tags == 'true' }}
            type=sha,prefix=sha-

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
